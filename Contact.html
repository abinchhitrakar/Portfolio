<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abin Chitrakar</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #0F172A;
            color: #E2E8F0;
        }

        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: #0F172A;
            padding: 15px 40px;
        }

        .nav-left a {
            position: relative;
            color: #E2E8F0;
            text-decoration: none;
            margin-right: 20px;
            font-size: 16px;
        }

        .nav-left a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -3px;
            width: 0;
            height: 2px;
            background-color: #ebc700;
            transition: 0.3s;
        }

        .nav-left a:hover::after {
            width: 100%;
        }

        .nav-right h2 {
            color: #E2E8F0;
            margin: 0;
            font-size: 20px;
        }

        .container {
            padding: 60px 40px;
        }

        h1 {
            margin-bottom: 30px;
        }

        form {
            max-width: 400px;
        }

        label {
            display: block;
            margin-bottom: 5px;
        }

        input, textarea {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border: none;
            border-radius: 5px;
            font-family: Arial, sans-serif;
        }

        textarea {
            resize: none;
            height: 100px;
        }

        button {
            padding: 10px 20px;
            background-color: #ebc700;
            color: #0F172A;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html">About</a>
            <a href="skills.html">Skills</a>
            <a href="interest.html">Interest</a>
            <a href="contact.html">Contact</a>
        </div>
        <div class="nav-right">
            <h2>Abin</h2>
        </div>
    </nav>

    <div class="container">
        <h1>Contact Me</h1>

        <form>
            <label for="name">Name</label>
            <input type="text" id="name" name="name">

            <label for="email">Email</label>
            <input type="email" id="email" name="email">

            <label for="message">Message</label>
            <textarea id="message" name="message"></textarea>

            <button type="submit">Submit</button>
        </form>
    </div>
</body>
</html>
