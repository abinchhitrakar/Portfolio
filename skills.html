        .navbar {
            display: flex;
            justify-content: space-between;

            height: 2px;
            background-color: #ebc700;
            transition: 0.3s;
        }

        .nav-left a:hover::after {
            width: 100%;
        }

        .nav-right h2 {

        }

        ul {

        }

        li {
            margin-bottom: 10px;
            font-size: 18px;
            padding: 8px 12px;
            background-color: #1E293B;
            border-radius: 6px;
        }

        .level {
            float: right;
            color: #ebc700;
            font-size: 14px;
        }
    </style>
</head>
